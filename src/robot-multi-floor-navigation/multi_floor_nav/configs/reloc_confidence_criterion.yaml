# 模块 C：重定位完成判据优化（基于协方差的置信度 + 连续 K 帧）
# nomotion update 使 AMCL 在静止时也能处理激光扫描、更新粒子分布，
# 使 tr(Σ) 和 C_t 具有实际物理意义。min_check_delay 保证 AMCL 至少
# 处理若干帧观测后再开始判定。
use_covariance_reloc: true
# 经验标定：当前 tr(Σ) 常见在 0.008~0.05，lambda=1 几乎总是 C_t≈1，无法形成区分度。
# 提升到 lambda=20 + tau=0.75 后：
#   tr=0.01 -> C_t≈0.82（可通过）
#   tr=0.03 -> C_t≈0.55（会被拦截）
reloc_confidence_lambda: 20.0
reloc_confidence_tau: 0.85
reloc_confidence_K: 3
reloc_min_check_delay_sec: 6.0

# per-floor timeout：等待收敛的最长时间，超时则 retry
# L0 非跨层场景，25s 足够判断收敛；L1 跨层重定位需要更长时间
reloc_check_timeout_sec: 45.0   # 全局 fallback
reloc_check_timeout_L0: 25.0    # L0 层：缩短 timeout 以增加 retry 机会
reloc_check_timeout_L1: 45.0    # L1 层：跨层重定位保持充裕等待
