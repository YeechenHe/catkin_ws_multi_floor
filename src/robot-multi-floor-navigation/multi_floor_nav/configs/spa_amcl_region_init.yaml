# SPA-AMCL 模块 A：电梯出口区域初始化
# 供 multi_floor_navigation_node 使用（需加载到该节点私有命名空间）
# 非零时 AMCL 会在 initialpose 中心附近按高斯散布粒子，减轻单点初值敏感
# 基线对比时请勿加载本文件（或全部设为 0）
#
# 修复说明：
#   缺陷一 —— 全局 sigma 改为 per-floor 独立参数，L0/L1 分别配置
#   缺陷二 —— per-floor nomotion 等待时间，SP-AMCL 的 L1 层等待时间略长
#   缺陷五 —— retry 退避参数；每次重试 sigma *= backoff_factor，上限 max_backoff 倍

# 全局 sigma（fallback，per-floor 未设时继承此值）
region_init_sigma_x:   0.15   # (m)
region_init_sigma_y:   0.15   # (m)
region_init_sigma_yaw: 0.1    # (rad) ≈ 5.7°

# 修复缺陷一：per-floor sigma（覆盖全局值）
# L0 层：起始位姿已知时使用单点初始化，避免 yaw 漂移导致起步卡住
region_init_sigma_x_L0:   0.0
region_init_sigma_y_L0:   0.0
region_init_sigma_yaw_L0: 0.0
# L1 层：F1 电梯出口走廊相对规整，可适当放宽 σ 以覆盖更广的出口区域
region_init_sigma_x_L1:   0.20
region_init_sigma_y_L1:   0.20
region_init_sigma_yaw_L1: 0.12

# 重定位通过门限（L0 更严格，L1 保持略宽松，但不能过松以免窄区贴墙）
max_linear_error:    0.20
max_linear_error_L1: 0.45
max_angular_error:   0.15

# 修复缺陷二：per-floor nomotion 等待时间
# SP-AMCL 粒子散布后收敛需要更多帧；L1 层（切层后首次）给更长时间
reloc_min_check_delay_sec: 6.0   # 全局 fallback（Baseline 也使用此值，保持公平）
reloc_min_check_delay_L0:  6.0   # L0 层：与全局一致
reloc_min_check_delay_L1:  12.0  # L1 层：粒子散布后需要足够帧数收敛（由 8s 提升至 12s，
                                  # 解决 small 工况下 40% HLF：粒子尚未收敛到真值附近即被放行）

# 修复缺陷五：retry 退避参数
# 每次 retry 时 sigma *= backoff_factor，最多扩大到 max_backoff 倍
# 例：retry=1 → 1.3×，retry=2 → 1.69×（上限 2.0×）
region_init_backoff_factor: 1.3
region_init_max_backoff:    2.0

# 自适应 sigma：根据偏移量动态缩放
# sigma_xy = min(per_floor_sigma, max(min_scale, alpha * offset_planar))
# 小偏移时粒子紧密分布，大偏移时粒子覆盖更广
region_init_sigma_adaptive_alpha: 0.35  # 比例因子
region_init_sigma_min_scale: 0.03       # 最小 sigma（m），避免退化为纯单点
region_init_sigma_min_yaw: 0.02         # 最小 yaw sigma（rad）
